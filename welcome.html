<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Masuk Dulu yaa!</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Lobster&family=Pixelify+Sans:wght@400..700&display=swap');
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center; 
      align-items: center; 
      height: 100vh;
      background: linear-gradient(135deg, #FFD5D5, #FFF5F7, #FFE0E0);
      background-size: 300% 300%;
      animation: gradientBG 8s ease infinite;
      overflow: hidden;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .content {
      text-align: center;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      max-width: 400px;
      background: #fff;
      padding: 20px 25px;
      border-radius: 16px;
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
      position: relative;
      z-index: 2;
    }

    .msg h1 {
      margin-bottom: 10px;
      font-family: "Lobster", cursive;
      color: #ff6b81;
    }

    .msg p {
      margin: 5px;
      color: #444;
    }

    .input,
    .btn {
      border: 0;
      outline: 0;
      padding: 10px;
      text-align: center;
      font-weight: 700;
      color: gray;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
      font-size: 14px;
      border-radius: 18px 18px 0px 0px;
    }
    .btn {
      border-radius: 0px 0px 18px 18px;
      background-color: #FDAAAA;
      color: #FFD5D5;
      cursor: pointer;
      transition: 0.5s;
    }
    .form {
      margin-top: 18px;
      padding: 4px;
      background-color: #FFD5D5;
      display: flex;
      flex-direction: column;
      border-radius: 18px;
      box-shadow: 0px 0px 3px 1px #FDAAAA;
    }
    .form:hover {
      box-shadow: 0px 0px 6px 2px rgb(200, 150, 150);
    }
    .btn:hover {
      background-color: #FFD5D5;
      color: #FDAAAA;
    }

    /* Floating hearts background */
    .hearts {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      overflow: hidden;
      z-index: 1;
      pointer-events: none;
    }
    .hearts span {
      position: absolute;
      bottom: -50px;
      font-size: 20px;
      color: #ff6b81;
      animation: float 6s linear infinite;
    }
    @keyframes float {
      0% { transform: translateY(0) rotate(0deg); opacity: 1; }
      100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
    }

    /* Popup styling */
    .popup {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      background: rgba(0,0,0,0.4);
      visibility: hidden;
      opacity: 0;
      transition: 0.3s;
      z-index: 10;
    }
    .popup.active {
      visibility: visible;
      opacity: 1;
    }
    .popup-content {
      background: #fff;
      padding: 25px 35px;
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 6px 16px rgba(0,0,0,0.25);
      animation: pop 0.5s ease;
    }
    @keyframes pop {
      from { transform: scale(0.7); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }
    .popup-content h2 {
      margin: 0 0 10px;
      color: #ff6b81;
      font-family: "Lobster", cursive;
    }
    .popup-content p {
      color: #444;
    }
    .popup-content button {
      padding: 8px 18px;
      border: none;
      border-radius: 8px;
      background: #FDAAAA;
      color: #fff;
      cursor: pointer;
      margin-top: 15px;
      font-weight: bold;
    }
    .popup-content button:hover {
      background: #ff6b81;
    }
  </style>
</head>
<body>
  <div class="content">
    <div class="msg">
      <h1>Haii Isi dulu yaa</h1>
      <p>Sebelum Lanjyut masukin kode yang fadly kasi ya, biar tau ini yang buka ale atau bukan</p>
      <p>AHAHAHA, Semoga kamu suka yaaa :) </p>
    </div>

    <div class="form">
      <input class="input" id="pw" type="password" placeholder="Apa Coba kode nya??" />
      <button id="btn" class="btn">Masuk</button>
    </div>
  </div>

  <!-- Floating hearts -->
  <div class="hearts" id="hearts"></div>

  <!-- Popup -->
  <div class="popup" id="popup">
    <div class="popup-content">
      <h2>Yeayyy kode nya benerr!! 🎉</h2>
      <p>Cieee Ale pinter banget sih 🥰</p>
      <button id="goCake">Lanjut Ke Kejutan 🎂</button>
    </div>
  </div>

  <!-- Confetti JS -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <script>
    const PASSWORD = '1234'; 
    const input = document.getElementById('pw');
    const btn = document.getElementById('btn');
    const popup = document.getElementById('popup');
    const goCake = document.getElementById('goCake');
    const heartsContainer = document.getElementById('hearts');

    function launchConfetti() {
      confetti({
        particleCount: 150,
        spread: 100,
        origin: { y: 0.6 }
      });
    }

    function tryLogin() {
      const val = input.value;
      if (!val) { alert('Isi dulu Kode nyaa!.'); return; }
      if (val === PASSWORD) {
        popup.classList.add('active');
        launchConfetti();
      } else {
        alert('Kode salah. Tanya Fadly');
      }
      input.value = '';
      input.focus();
    }

    btn.addEventListener('click', tryLogin);
    input.addEventListener('keydown', (e) => { if (e.key === 'Enter') tryLogin(); });

    goCake.addEventListener('click', () => {
      location.href = 'cake.html';
    });

    // Generate floating hearts
    function createHeart() {
      const heart = document.createElement("span");
      heart.innerHTML = "❤";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = Math.random() * 20 + 15 + "px";
      heart.style.animationDuration = Math.random() * 3 + 3 + "s";
      heartsContainer.appendChild(heart);
      setTimeout(() => { heart.remove(); }, 6000);
    }
    setInterval(createHeart, 500);
  </script>
</body>
</html>
